<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斩杀线 - 文字冒险游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- 开始界面 -->
        <div id="start-screen" class="screen active">
            <h1 class="title">斩 杀 线</h1>
            <p class="subtitle">从22岁到35岁的人生十字路口</p>
            <div class="gender-select">
                <p class="gender-label">请选择你的性别：</p>
                <button class="gender-btn" data-gender="male">♂ 男性</button>
                <button class="gender-btn" data-gender="female">♀ 女性</button>
            </div>
            <button id="start-btn" class="start-btn" disabled>开始游戏</button>
            <div class="warning">
                <p>⚠️ 提示：健康归零将直接触发 Bad Ending</p>
            </div>
        </div>

        <!-- 游戏主界面 -->
        <div id="game-screen" class="screen">
            <div class="header">
                <div class="year-display">
                    <span id="age">22</span>岁
                </div>
                <div class="stats-bar">
                    <div class="stat" data-stat="wealth" title="财富">
                        <span class="stat-icon">💰</span>
                        <span class="stat-value" id="stat-wealth">0</span>
                    </div>
                    <div class="stat" data-stat="career" title="事业">
                        <span class="stat-icon">📈</span>
                        <span class="stat-value" id="stat-career">0</span>
                    </div>
                    <div class="stat" data-stat="emotion" title="情感">
                        <span class="stat-icon">❤️</span>
                        <span class="stat-value" id="stat-emotion">0</span>
                    </div>
                    <div class="stat" data-stat="health" title="健康">
                        <span class="stat-icon">🏃</span>
                        <span class="stat-value" id="stat-health">0</span>
                    </div>
                    <div class="stat" data-stat="freedom" title="自由度">
                        <span class="stat-icon">🦅</span>
                        <span class="stat-value" id="stat-freedom">0</span>
                    </div>
                </div>
            </div>

            <div class="news-ticker" id="news-ticker">
                <span class="news-label">📰 年度要闻：</span>
                <span id="news-content"></span>
            </div>

            <div class="scene-container">
                <div class="scene-title" id="scene-title"></div>
                <div class="scene-content" id="scene-content"></div>
                <div class="choices-container" id="choices-container">
                    <!-- 选项按钮将通过JS动态生成 -->
                </div>
            </div>

            <div class="event-modal" id="event-modal">
                <div class="event-content">
                    <h3 class="event-title" id="event-title"></h3>
                    <p class="event-desc" id="event-desc"></p>
                    <button class="event-confirm-btn" id="event-confirm">确认</button>
                </div>
            </div>

            <div class="game-over-modal" id="game-over-modal">
                <div class="game-over-content">
                    <h2 id="game-over-title"></h2>
                    <p id="game-over-desc"></p>
                    <button class="restart-btn" id="restart-btn">重新开始</button>
                </div>
            </div>
        </div>

        <!-- 结局界面 -->
        <div id="ending-screen" class="screen">
            <h1 class="ending-title" id="ending-title"></h1>
            <div class="ending-stats">
                <h3>最终属性</h3>
                <div id="final-stats"></div>
            </div>
            <div class="ending-description" id="ending-description"></div>
            <button class="restart-btn" id="ending-restart">再玩一次</button>
        </div>
    </div>

    <script src="js/story.js"></script>
    <script src="js/events.js"></script>
    <script src="js/endings.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
